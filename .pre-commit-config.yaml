repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: gofmt
        entry: gofmt -w ./cmd ./internal
        language: system
        types: [go]
        pass_filenames: false
      - id: go-test-fast
        name: go test (no fyne UI)
        entry: go test -count=1 ./internal/core/... ./internal/downloader/... ./internal/i18n/... ./internal/configdir/... ./internal/settings/... ./internal/service/...
        language: system
        pass_filenames: false
        always_run: true
