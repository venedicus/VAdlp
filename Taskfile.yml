version: "3"

vars:
  BIN_DIR: bin
  BIN: '{{.BIN_DIR}}/vadlp{{if eq OS "windows"}}.exe{{end}}'
  VERSION:
    sh: |
      if command -v bash >/dev/null 2>&1 && [ -f scripts/build-metadata.sh ]; then
        bash scripts/build-metadata.sh | awk -F= '/^VERSION=/ {print $2; exit}'
      else
        git describe --tags --always --dirty 2>/dev/null || echo dev
      fi
  COMMIT:
    sh: |
      if command -v bash >/dev/null 2>&1 && [ -f scripts/build-metadata.sh ]; then
        bash scripts/build-metadata.sh | awk -F= '/^COMMIT=/ {print $2; exit}'
      else
        git rev-parse --short HEAD 2>/dev/null || echo none
      fi
  BUILD_DATE:
    sh: |
      if command -v bash >/dev/null 2>&1 && [ -f scripts/build-metadata.sh ]; then
        bash scripts/build-metadata.sh | awk -F= '/^DATE=/ {print $2; exit}'
      else
        date -u +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo ""
      fi
  LDFLAGS: >-
    -X vadlp/internal/version.Version={{.VERSION}}
    -X vadlp/internal/version.Commit={{.COMMIT}}
    -X vadlp/internal/version.BuildDate={{.BUILD_DATE}}

tasks:
  build:app:
    desc: Build vadlp into bin/
    env:
      CGO_ENABLED: "1"
    sources:
      - cmd/**/*.go
      - internal/**/*.go
      - internal/i18n/locales/*.json
      - go.mod
      - go.sum
    generates:
      - '{{.BIN}}'
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN}} ./cmd/vadlp

  test:
    desc: Run all tests
    cmds:
      - go test -count=1 ./...

  test:coverage:
    desc: Run unit tests with coverage gate (CI subset)
    cmds:
      - go test -count=1 -coverprofile=coverage.out ./internal/core/... ./internal/downloader/... ./internal/i18n/... ./internal/configdir/... ./internal/settings/... ./internal/service/...
      - go test -count=1 ./internal/ui/fyne/...
      - go tool cover -func=coverage.out
      - |
        total=$(go tool cover -func=coverage.out | awk '/total:/ {print $3}' | tr -d '%')
        awk -v c="$total" 'BEGIN { exit !(c+0 >= 45) }'

  i18n:check:
    desc: Verify en/ru locale keys match
    cmds:
      - go test -count=1 -run TestLocaleKeyParity ./internal/i18n/...

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  lint:
    desc: golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:check:
    desc: Verify gofmt without writing
    cmds:
      - |
        test -z "$(gofmt -l ./cmd ./internal)"

  run:
    desc: Run vadlp
    deps: [build:app]
    cmds:
      - '{{.BIN}}'

  fmt:
    desc: gofmt cmd and internal
    cmds:
      - gofmt -w ./cmd ./internal

  check:
    desc: fmt, vet, lint, i18n, test, and build
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: i18n:check
      - task: test
      - task: build:app
