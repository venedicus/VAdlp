version: "3"

vars:
  BIN_DIR: bin
  BIN: '{{.BIN_DIR}}/vadlp{{if eq OS "windows"}}.exe{{end}}'

tasks:
  build:app:
    desc: Build vadlp
    sources:
      - cmd/**/*.go
      - internal/**/*.go
      - internal/i18n/locales/*.json
      - go.mod
      - go.sum
    generates:
      - '{{.BIN}}'
    cmds:
      - go build -o {{.BIN}} ./cmd/vadlp

  run:
    desc: Run vadlp
    deps: [build:app]
    cmds:
      - '{{.BIN}}'

  build:
    desc: Build vadlp
    cmds:
      - task: build:app

  fmt:
    desc: gofmt cmd and internal
    cmds:
      - gofmt -w ./cmd ./internal

  check:
    desc: fmt and build
    cmds:
      - task: fmt
      - task: build
