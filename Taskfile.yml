version: "3"

vars:
  BIN_DIR: build/bin
  BIN: '{{.BIN_DIR}}/vadlp{{if eq OS "windows"}}.exe{{end}}'
  WAILS: go run github.com/wailsapp/wails/v2/cmd/wails@latest
  VERSION:
    sh: go run ./tools/buildmeta --field version
  COMMIT:
    sh: go run ./tools/buildmeta --field commit
  BUILD_DATE:
    sh: go run ./tools/buildmeta --field date
  LDFLAGS: >-
    -X vadlp/internal/version.Version={{.VERSION}}
    -X vadlp/internal/version.Commit={{.COMMIT}}
    -X vadlp/internal/version.BuildDate={{.BUILD_DATE}}

tasks:
  build:app:
    desc: Build vadlp into bin/ (Wails + React)
    env:
      CGO_ENABLED: "1"
    sources:
      - main.go
      - internal/**/*.go
      - internal/i18n/locales/*.json
      - frontend/**/*
      - go.mod
      - go.sum
    generates:
      - '{{.BIN}}'
    cmds:
      - '{{.WAILS}} build -ldflags "{{.LDFLAGS}}" -nopackage'

  dev:
    desc: Run Wails dev mode (hot reload)
    env:
      CGO_ENABLED: "1"
    cmds:
      - '{{.WAILS}} dev'

  test:
    desc: Run all tests (Go + frontend)
    cmds:
      - go test -count=1 ./...
      - task: test:frontend

  test:frontend:
    desc: Run frontend unit tests
    dir: frontend
    cmds:
      - npm test

  test:coverage:
    desc: Run unit tests with coverage gate (CI subset)
    cmds:
      - go test -count=1 -coverprofile=coverage.out ./internal/core/... ./internal/downloader/... ./internal/i18n/... ./internal/configdir/... ./internal/settings/... ./internal/service/... ./internal/instance/...
      - go tool cover -func=coverage.out
      - |
        total=$(go tool cover -func=coverage.out | awk '/total:/ {print $3}' | tr -d '%')
        awk -v c="$total" 'BEGIN { exit !(c+0 >= 45) }'

  i18n:check:
    desc: Verify all locale files have the same keys as en.json
    cmds:
      - go test -count=1 -run TestLocaleKeyParity ./internal/i18n/...

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  lint:
    desc: golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:check:
    desc: Verify gofmt without writing
    cmds:
      - |
        test -z "$(gofmt -l main.go ./internal ./tools)"

  run:
    desc: Run vadlp
    deps: [build:app]
    cmds:
      - '{{.BIN}}'

  fmt:
    desc: gofmt main.go, internal, and tools
    cmds:
      - gofmt -w main.go ./internal ./tools

  check:
    desc: fmt, vet, lint, i18n, test, and build
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: i18n:check
      - task: test
      - task: build:app
