# https://taskfile.dev — local automation (optional; plain `go` commands work too).
version: "3"

tasks:
  run:
    desc: Run VAdlp desktop app
    cmds:
      - go run ./cmd/vadlp

  build:
    desc: Build all packages
    cmds:
      - go build ./...

  build:app:
    desc: Build VAdlp binary
    cmds:
      - go build -o vadlp ./cmd/vadlp

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w ./cmd ./internal

  check:
    desc: Format and build checks
    cmds:
      - task: fmt
      - task: build
