version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      fyne:
        patterns:
          - "fyne.io/*"
      golang-x:
        patterns:
          - "golang.org/x/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
