name: Fyne build setup
description: Go toolchain and native deps for CGO/Fyne builds

inputs:
  go-version:
    description: Go version
    required: true
  platform:
    description: linux, windows, or macos
    required: true
  windows-arch:
    description: Windows GOARCH (amd64 or arm64); arm64 skips MSYS2 x86_64 gcc
    required: false
    default: amd64

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - name: Linux build deps
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxkbcommon-dev libgtk-3-dev

    - uses: msys2/setup-msys2@v2
      if: inputs.platform == 'windows' && inputs.windows-arch != 'arm64'
      with:
        msystem: MINGW64
        update: true
        install: mingw-w64-x86_64-gcc
