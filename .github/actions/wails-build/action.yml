name: Wails build setup
description: Go + Node toolchain and native deps for CGO/Wails builds

inputs:
  go-version:
    description: Go version
    required: true
  platform:
    description: linux, windows, or macos
    required: true
  windows-arch:
    description: Windows GOARCH (amd64 or arm64); arm64 skips MSYS2 x86_64 gcc
    required: false
    default: amd64

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - uses: actions/setup-node@v5
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Linux build deps
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.1-dev \
          libfuse2 patchelf file

    - uses: msys2/setup-msys2@v2
      if: inputs.platform == 'windows' && inputs.windows-arch != 'arm64'
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          zip
