name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.25"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: amd64
            binary: vadlp
            primary: vadlp-linux-amd64.tar.gz
            extras: vadlp-linux-amd64.AppImage
            pack: tar appimage
          - os: ubuntu-24.04-arm
            platform: linux
            goos: linux
            goarch: arm64
            binary: vadlp
            primary: vadlp-linux-arm64.tar.gz
            extras: ""
            pack: tar
          - os: windows-latest
            platform: windows
            windows-arch: amd64
            goos: windows
            goarch: amd64
            binary: vadlp.exe
            primary: vadlp-windows-amd64.zip
            extras: ""
            pack: zip
          - os: macos-latest
            platform: macos
            goos: darwin
            goarch: arm64
            binary: vadlp
            primary: vadlp-darwin-arm64.tar.gz
            extras: vadlp-darwin-arm64.dmg
            pack: tar dmg
          - os: macos-latest
            platform: macos
            goos: darwin
            goarch: amd64
            binary: vadlp
            primary: vadlp-darwin-amd64.tar.gz
            extras: vadlp-darwin-amd64.dmg
            pack: tar dmg

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/wails-build
        with:
          go-version: ${{ env.GO_VERSION }}
          platform: ${{ matrix.platform }}
          windows-arch: ${{ matrix.windows-arch || 'amd64' }}

      - name: Version
        id: meta
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BINARY: ${{ matrix.binary }}
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          DATE: ${{ steps.meta.outputs.date }}
        run: go run ./tools/vadlp-build

      - name: Package
        env:
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          set -euo pipefail
          for fmt in ${{ matrix.pack }}; do
            [[ "$fmt" == "appimage" ]] && continue
            case "$fmt" in
              tar) out="${{ matrix.primary }}" ;;
              zip) out="${{ matrix.primary }}" ;;
              dmg) out="${{ matrix.extras }}" ;;
            esac
            go run ./tools/releasepack "$fmt" "${{ matrix.binary }}" "$out"
          done

      - name: Package AppImage
        if: contains(matrix.pack, 'appimage')
        continue-on-error: true
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go run ./tools/releasepack appimage "${{ matrix.binary }}" "${{ matrix.extras }}"

      - name: Checksum
        shell: bash
        run: |
          shopt -s nullglob
          for f in ${{ matrix.primary }} ${{ matrix.extras }}; do
            [[ -z "$f" || ! -f "$f" ]] && continue
            if command -v sha256sum >/dev/null; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p upload
          for f in "${{ matrix.primary }}" "${{ matrix.extras }}"; do
            [[ -z "$f" || ! -f "$f" ]] && continue
            cp "$f" upload/
            [[ -f "$f.sha256" ]] && cp "$f.sha256" upload/
          done
          ls -la upload

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.primary }}-${{ matrix.goarch }}
          path: upload/*

  publish:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          find dist -type f \( \
            -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' -o \
            -name '*.AppImage' -o -name '*.sha256' \
          \) -exec cp {} release/ \;
          cd release
          if command -v sha256sum >/dev/null; then
            sha256sum *.tar.gz *.zip *.dmg *.AppImage 2>/dev/null | grep -v '\.sha256$' > checksums.txt || true
          else
            shasum -a 256 *.tar.gz *.zip *.dmg *.AppImage 2>/dev/null | grep -v '\.sha256$' > checksums.txt || true
          fi
          ls -la
          if ! compgen -G "*.tar.gz" >/dev/null && \
             ! compgen -G "*.zip" >/dev/null && \
             ! compgen -G "*.dmg" >/dev/null && \
             ! compgen -G "*.AppImage" >/dev/null; then
            echo "No release artifacts were uploaded by build jobs." >&2
            exit 1
          fi

      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
