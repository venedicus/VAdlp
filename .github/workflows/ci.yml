name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/fyne-build
        with:
          go-version: ${{ env.GO_VERSION }}
          platform: linux

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          golangci-lint run ./...

      - name: gofmt
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/fyne-build
        with:
          go-version: ${{ env.GO_VERSION }}
          platform: linux

      - name: Build metadata
        id: meta
        shell: bash
        run: bash .github/scripts/build-metadata.sh

      - run: go vet ./...

      - name: Unit tests and coverage
        run: |
          go test -count=1 -coverprofile=coverage.out \
            ./internal/core/... ./internal/downloader/... ./internal/i18n/... \
            ./internal/configdir/... ./internal/settings/... ./internal/service/...
          total=$(go tool cover -func=coverage.out | awk '/total:/ {print $3}' | tr -d '%')
          echo "coverage=${total}%"
          awk -v c="$total" 'BEGIN { exit !(c+0 >= 45) }'

      - run: go test -count=1 ./...

      - name: Build
        shell: bash
        env:
          GOOS: linux
          GOARCH: amd64
          BINARY: vadlp
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          DATE: ${{ steps.meta.outputs.date }}
        run: bash .github/scripts/go-build.sh

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/fyne-build
        with:
          go-version: ${{ env.GO_VERSION }}
          platform: linux

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -format text ./...

  build:
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            goos: linux
            goarch: amd64
            binary: vadlp
          - os: ubuntu-24.04-arm
            platform: linux
            goos: linux
            goarch: arm64
            binary: vadlp
          - os: windows-latest
            platform: windows
            goos: windows
            goarch: amd64
            binary: vadlp.exe
          - os: macos-latest
            platform: macos
            goos: darwin
            goarch: arm64
            binary: vadlp
          - os: macos-latest
            platform: macos
            goos: darwin
            goarch: amd64
            binary: vadlp

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/fyne-build
        with:
          go-version: ${{ env.GO_VERSION }}
          platform: ${{ matrix.platform }}

      - name: Build metadata
        id: meta
        shell: bash
        run: bash .github/scripts/build-metadata.sh

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          BINARY: ${{ matrix.binary }}
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ steps.meta.outputs.commit }}
          DATE: ${{ steps.meta.outputs.date }}
        run: bash .github/scripts/go-build.sh
